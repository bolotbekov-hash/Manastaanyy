<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Манас Ааламы — Путь Баатыра</title>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="journey-map">
    <div class="map-point active" id="p0">1 <span class="map-label">Балалык</span></div>
    <div class="map-point" id="p1">2 <span class="map-label">Биримдик</span></div>
    <div class="map-point" id="p2">3 <span class="map-label">Чоң Казат</span></div>
    <div class="map-point" id="p3">4 <span class="map-label">Насаат</span></div>
</div>

<div class="stats-bar">
    <div class="hearts" id="hearts-display">❤️❤️❤️❤️❤️</div>
    <div class="score-text">Упай: <span id="current-score">0</span></div>
</div>

<div class="quiz-card" id="main-card">
    <div id="quiz-screen">
        <div class="phase-indicator" id="phase-name"></div>
        <div class="question-counter" id="q-counter"></div>
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options"></div>

        <div id="fact-box">
            <h4><i class="fas fa-scroll"></i> Тарыхый барактардан</h4>
            <p id="fact-text"></p>
        </div>

        <button id="next-btn">Кийинки кадам <i class="fas fa-arrow-right"></i></button>
    </div>

    <div class="result-screen" id="result-screen">
        <h1>Сапар аяктады!</h1>
        <p>Сиздин жалпы упайыңыз: <span id="final-score"></span></p>
        <div class="rank-badge" id="rank-name"></div>
        <p id="rank-desc"></p>
        <button class="restart-btn1" onclick="location.reload()">Жаңыдан баштоо</button>
    </div>

    <div class="game-over-screen" id="game-over-screen">
        <h1>Сапар үзгүлтүккө учурады</h1>
        <p>Сиз бардык мүмкүнчүлүктөрүңүздү колдондуңуз.</p>
        <button class="restart-btn" onclick="location.reload()">Кайра аракет кылуу</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
